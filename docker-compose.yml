version: '3.8'

services:
  # Web server with interactive UI
  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    container_name: osint-web
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./static:/app/static
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Discord/Telegram bot for continuous monitoring
  bot:
    build:
      context: .
      dockerfile: Dockerfile.bot
    container_name: osint-bot
    env_file:
      - .env
    working_dir: /app
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    command: ["python", "-m", "socialosintagent.bot"]
    restart: unless-stopped
    depends_on:
      - web
    environment:
      - PYTHONUNBUFFERED=1

  # CLI agent for one-off analyses
  agent:
    build:
      context: .
      dockerfile: Dockerfile.agent
    container_name: osint-agent
    env_file:
      - .env
    working_dir: /app
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    environment:
      - PYTHONUNBUFFERED=1
    # Default command (can be overridden)
    command: ["python", "-m", "socialosintagent.main"]
    # CLI service doesn't run continuously - used with 'docker compose run'
    profiles:
      - cli

